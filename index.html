<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A browser-only visualizer for shortest-path algorithms on a city graph."
    />
    <title>Shortest Path Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f1117',
              surface: '#1a1f2e',
              border: '#2a3142',
              accent: '#6366f1',
              'accent-light': '#818cf8',
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background text-slate-100 antialiased">
    <div id="app" class="min-h-screen bg-background">
      <main class="flex h-screen w-screen overflow-hidden">
        <aside
          class="z-10 hidden h-full w-80 shrink-0 border-r border-border bg-surface p-6 shadow-2xl shadow-black/30 md:flex md:flex-col"
          aria-label="Visualization controls"
        >
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-accent-light">
              Phase 1
            </p>
            <h1 class="mt-3 text-2xl font-semibold tracking-normal text-white">
              Shortest Path Visualizer
            </h1>
            <p class="mt-3 text-sm leading-6 text-slate-400">
              Map scaffold ready for city graph rendering and algorithm controls.
            </p>
          </div>

          <div class="mt-8 border-t border-border pt-6">
            <h2 class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-400">
              Controls
            </h2>
            <div class="mt-5 space-y-4">
              <div class="h-10 rounded border border-border bg-background/70"></div>
              <div class="h-10 rounded border border-border bg-background/70"></div>
              <div class="h-10 rounded border border-border bg-background/70"></div>
            </div>
          </div>

          <div class="mt-auto rounded border border-border bg-background/60 p-4">
            <p class="text-sm text-slate-400">
              Leaflet map initialized with CartoDB Dark Matter tiles.
            </p>
          </div>
        </aside>

        <section class="relative h-full min-w-0 flex-1 bg-background" aria-label="World map">
          <div id="map" class="h-full w-full"></div>
          <div
            class="pointer-events-none absolute left-4 top-4 rounded border border-border bg-surface/90 px-4 py-3 shadow-xl shadow-black/30 md:hidden"
          >
            <p class="text-sm font-semibold text-white">Shortest Path Visualizer</p>
            <p class="text-xs text-slate-400">Phase 1 map scaffold</p>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
